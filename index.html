<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vacation Planner Timeline</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="timeline-frame">
        <button id="deleteSelectedBtn" type="button" class="danger floating-delete hidden" aria-label="Delete selected capsule">(X)</button>
        <section class="timeline-scroll" id="timelineScroll">
          <div class="timeline-board" id="timelineBoard">
            <div class="capsules-layer" id="capsulesLayer"></div>
            <div class="selection-layer" id="selectionLayer"></div>
            <div class="timeline-axis" id="timelineAxis">
              <div class="axis-line" id="axisLine"></div>
              <div class="dots-row" id="dotsRow"></div>
              <div class="labels-row" id="labelsRow"></div>
            </div>
          </div>
        </section>
      </section>
      <section class="note-panel-wrap">
        <section class="note-panel top-note-panel" id="notePanel" aria-live="polite">
          <div class="note-top-row">
            <input id="noteTitleInput" type="text" placeholder="Select a capsule title..." />
            <textarea id="noteInput" rows="2" placeholder="Select a capsule note..."></textarea>
            <div class="duration-controls" id="durationControls" aria-label="Capsule duration">
              <button type="button" id="durationMinusBtn" aria-label="Remove one day">-</button>
              <span id="durationValue">0 days</span>
              <button type="button" id="durationPlusBtn" aria-label="Add one day">+</button>
            </div>
          </div>
          <div class="note-controls-row">
            <div class="color-picker" id="colorPicker" aria-label="Capsule color picker">
              <button type="button" class="color-swatch" data-color="#ef4444" aria-label="Red"></button>
              <button type="button" class="color-swatch" data-color="#f97316" aria-label="Orange"></button>
              <button type="button" class="color-swatch" data-color="#eab308" aria-label="Yellow"></button>
              <button type="button" class="color-swatch" data-color="#22c55e" aria-label="Green"></button>
              <button type="button" class="color-swatch" data-color="#14b8a6" aria-label="Teal"></button>
              <button type="button" class="color-swatch" data-color="#3b82f6" aria-label="Blue"></button>
              <button type="button" class="color-swatch" data-color="#8b5cf6" aria-label="Violet"></button>
              <button type="button" class="color-swatch" data-color="#ec4899" aria-label="Pink"></button>
            </div>
          </div>
        </section>
      </section>
      <footer class="app-footer">
        <div class="actions footer-actions">
          <button id="exportBtn" type="button">Export JSON</button>
          <label for="importInput" class="import-label">Import JSON</label>
          <input id="importInput" type="file" accept="application/json" />
          <button id="clearBtn" type="button" class="danger">Clear All</button>
        </div>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
